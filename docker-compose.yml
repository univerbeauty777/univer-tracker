# Univer Tracker — production stack
#
# Designed for deployment via Coolify "Docker Compose" resource.
# Coolify will inject SERVICE_FQDN_* magic variables when domains
# are configured on the API and frontend services (see docs/DEPLOY.md).
#
# Local development: `docker compose up -d` after `cp .env.example .env`.

networks:
  ut_internal:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-univertracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-univertracker}
      POSTGRES_DB: ${POSTGRES_DB:-univertracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ut_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-univertracker} -d ${POSTGRES_DB:-univertracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ut_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - postgres://${POSTGRES_USER:-univertracker}:${POSTGRES_PASSWORD:-univertracker}@postgres:5432/${POSTGRES_DB:-univertracker}?sslmode=disable
    networks:
      - ut_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      SERVICE_FQDN_BACKEND_8080:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8080
      APP_URL: ${SERVICE_URL_BACKEND_8080:-http://localhost:8080}
      PUBLIC_URL: ${SERVICE_URL_FRONTEND_3000:-http://localhost:3000}
      DATABASE_URL: postgres://${POSTGRES_USER:-univertracker}:${POSTGRES_PASSWORD:-univertracker}@postgres:5432/${POSTGRES_DB:-univertracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      WC_URL: ${WC_URL}
      WC_CONSUMER_KEY: ${WC_CONSUMER_KEY}
      WC_CONSUMER_SECRET: ${WC_CONSUMER_SECRET}
      WC_WEBHOOK_SECRET: ${WC_WEBHOOK_SECRET}
      FRENET_API_TOKEN: ${FRENET_API_TOKEN}
      FRENET_PANEL_EMAIL: ${FRENET_PANEL_EMAIL}
      FRENET_PANEL_PASSWORD: ${FRENET_PANEL_PASSWORD}
      WAHA_URL: ${WAHA_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      GOMEMLIMIT: 900MiB
    expose:
      - "8080"
    networks:
      - ut_internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-univertracker}:${POSTGRES_PASSWORD:-univertracker}@postgres:5432/${POSTGRES_DB:-univertracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WC_URL: ${WC_URL}
      WC_CONSUMER_KEY: ${WC_CONSUMER_KEY}
      WC_CONSUMER_SECRET: ${WC_CONSUMER_SECRET}
      FRENET_API_TOKEN: ${FRENET_API_TOKEN}
      WAHA_URL: ${WAHA_URL}
      WAHA_API_KEY: ${WAHA_API_KEY}
      GOMEMLIMIT: 700MiB
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f /app/worker > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ut_internal
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${SERVICE_URL_BACKEND_8080:-http://localhost:8080}
        INTERNAL_API_URL: http://backend:8080
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SERVICE_FQDN_FRONTEND_3000:
      NEXT_PUBLIC_API_URL: ${SERVICE_URL_BACKEND_8080:-http://localhost:8080}
      INTERNAL_API_URL: http://backend:8080
      NODE_OPTIONS: "--max-old-space-size=768"
    expose:
      - "3000"
    networks:
      - ut_internal
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

volumes:
  postgres_data:
  redis_data:
