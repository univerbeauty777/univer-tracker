# Univer Tracker — production stack
#
# Designed for deployment via Coolify "Docker Compose" resource.
# Coolify will inject SERVICE_FQDN_* magic variables when domains
# are configured on the API and frontend services (see docs/DEPLOY.md).
#
# Local development: `docker compose up -d` after `cp .env.example .env`.

networks:
  ut_internal:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-univertracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-univertracker}
      POSTGRES_DB: ${POSTGRES_DB:-univertracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ut_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-univertracker} -d ${POSTGRES_DB:-univertracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ut_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.18.1
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database
      - postgres://${POSTGRES_USER:-univertracker}:${POSTGRES_PASSWORD:-univertracker}@postgres:5432/${POSTGRES_DB:-univertracker}?sslmode=disable
      - up
    networks:
      - ut_internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8080
      APP_URL: ${APP_URL}
      PUBLIC_URL: ${PUBLIC_URL}
      DATABASE_URL: postgres://${POSTGRES_USER:-univertracker}:${POSTGRES_PASSWORD:-univertracker}@postgres:5432/${POSTGRES_DB:-univertracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      WC_URL: ${WC_URL}
      WC_CONSUMER_KEY: ${WC_CONSUMER_KEY}
      WC_CONSUMER_SECRET: ${WC_CONSUMER_SECRET}
      WC_WEBHOOK_SECRET: ${WC_WEBHOOK_SECRET}
      FRENET_API_TOKEN: ${FRENET_API_TOKEN}
      FRENET_PANEL_EMAIL: ${FRENET_PANEL_EMAIL}
      FRENET_PANEL_PASSWORD: ${FRENET_PANEL_PASSWORD}
      ZAPGRUP_URL: ${ZAPGRUP_URL}
      ZAPGRUP_API_TOKEN: ${ZAPGRUP_API_TOKEN}
    networks:
      - ut_internal

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-univertracker}:${POSTGRES_PASSWORD:-univertracker}@postgres:5432/${POSTGRES_DB:-univertracker}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WC_URL: ${WC_URL}
      WC_CONSUMER_KEY: ${WC_CONSUMER_KEY}
      WC_CONSUMER_SECRET: ${WC_CONSUMER_SECRET}
      FRENET_API_TOKEN: ${FRENET_API_TOKEN}
      ZAPGRUP_URL: ${ZAPGRUP_URL}
      ZAPGRUP_API_TOKEN: ${ZAPGRUP_API_TOKEN}
    networks:
      - ut_internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    networks:
      - ut_internal

volumes:
  postgres_data:
  redis_data:
