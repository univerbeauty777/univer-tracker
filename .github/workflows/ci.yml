name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Verify go.mod
        run: go mod tidy && git diff --exit-code go.mod || (echo "::error::go.mod is not tidy" && exit 1)

      - name: Format check
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "::error::Go files are not formatted. Run 'gofmt -s -w .'"
            gofmt -s -d .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build API
        run: go build -trimpath ./cmd/api

      - name: Build worker
        run: go build -trimpath ./cmd/worker

      - name: Test
        run: go test -race -cover ./...

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build
